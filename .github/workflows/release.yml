name: release

on:
  push:
    tags: [ "v*" ]

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: |
          VERSION=${{ github.ref_name }}
          dotnet pack -c Release -o packages /p:Version=${VERSION#v}
      - name: Push
        run: |
          dotnet nuget push --skip-duplicate --api-key ${{ github.token }} --source https://nuget.pkg.github.com/interflare/index.json packages/*
          dotnet nuget push --skip-duplicate --api-key ${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json packages/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/*

  release:
    runs-on: ubuntu-latest
    needs: pack
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          makeLatest: true
          allowUpdates: true
          artifacts: packages/*
          artifactErrorsFailBuild: true
          body: ${{ steps.changelog.outputs.changes }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: 'docs: update changelog for ${{ github.ref_name }} [skip ci]'
          file_pattern: CHANGELOG.md
