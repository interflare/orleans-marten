name: "CI: Report"

on:
  workflow_run:
    workflows: [ 'CI' ]
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report test results
        uses: dorny/test-reporter@v3
        with:
          artifact: test-results
          name: test results
          path: '*.trx'
          reporter: dotnet-trx
