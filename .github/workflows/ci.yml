name: "CI"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: | # multiple versions needed for testing
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run unit tests
        run: dotnet test --filter "FullyQualifiedName~Unit.Tests" --no-build -c Release --logger "console;verbosity=detailed" --logger trx --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Run integration tests
        if: ${{ !cancelled() }}
        run: dotnet test --filter "FullyQualifiedName~Integration.Tests" --no-build -c Release --logger "console;verbosity=detailed" --logger trx --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: TestResults/*.trx
