name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | # multiple versions needed for testing
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run unit tests
        run: dotnet test --filter "FullyQualifiedName~Unit.Tests" --no-build -c Release --logger "console;verbosity=detailed" --logger trx --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test --filter "FullyQualifiedName~Integration.Tests" --no-build -c Release --logger "console;verbosity=detailed" --logger trx --collect:"XPlat Code Coverage"

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: test results
          path: '**/*.trx'
          reporter: dotnet-trx
